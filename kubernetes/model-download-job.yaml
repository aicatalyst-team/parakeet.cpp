apiVersion: batch/v1
kind: Job
metadata:
  name: parakeet-model-download
  namespace: poc-parakeet-cpp
  labels:
    app: parakeet-cpp
    autopoc.io/project: parakeet-cpp
    autopoc.io/phase: model-download
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: parakeet-cpp
    spec:
      containers:
        - name: downloader
          image: registry.access.redhat.com/ubi9/ubi-minimal
          command: ["/bin/sh", "-c"]
          args:
            - |
              microdnf install -y curl && microdnf clean all
              echo "Downloading parakeet-ctc-110m-q8_0.gguf model..."
              curl -L --retry 3 --retry-delay 5 \
                -o /models/parakeet-ctc-110m-q8_0.gguf \
                "https://huggingface.co/mudler/parakeet-cpp-gguf/resolve/main/parakeet-ctc-110m-q8_0.gguf"
              ls -lh /models/
              echo "Download complete."
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: parakeet-models
      restartPolicy: Never
